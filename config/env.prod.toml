[logging]
level = "INFO"

[websocket]
host = "0.0.0.0"
port = 8765
max_message_size = 10485760

[http]
host = "0.0.0.0"
port = 8080

[speech]
models_root = "models"

[providers]
asr = "primary"
llm = "chatbot_api"
tts = "remote_service"

[agentbuild]
base_url = "xxxx"
api_key = "xxxxxx"

[agentbuild.chatbot]
endpoint_path = "/app/run/4bbeede91c2343068a7e19e3056d479e"
streaming = true
stream_answer_node_name = "智能问答"
fallback_reply = "抱歉，当前智能问答服务暂时不可用，请稍后再试。"

[agentbuild.knowledge_base]
project_uid = "077920af85034c85bee1ff9647f29c4f"

[tts.remote_service]
driver = "remote_http_stream"
stream_url = "http://127.0.0.1:18083/tts/stream"
voice = "default"
request_timeout_sec = 30.0

[asr.primary]
driver = "remote_http"
endpoint = "http://127.0.0.1:18081/asr"
request_timeout_sec = 20.0
audio_field_name = "file"
audio_filename = "audio.wav"
response_text_path = "text"

[llm.chatbot_api]
driver = "chatbot_sse"

[database]
dsn = "postgresql://postgres:postgres@host.docker.internal:15432/nexus_api"
min_pool_size = 1
max_pool_size = 5
command_timeout_sec = 10.0

[database_embodied]
dsn = "postgresql://postgres:postgres@host.docker.internal:15432/embodied_cloud"
min_pool_size = 1
max_pool_size = 5
command_timeout_sec = 10.0

[percept-api]
endpoint = "http://host.docker.internal:8989/embodied_api"
x-api-key = "nexus-percept-internal-key"

[live_camera]
srs_webrtc_base_url = "http://192.168.21.139:1985"
srs_http_base_url = "http://192.168.21.139:18084"
srs_app = "live"
[conversation]
session_limit = 20
turn_limit = 50
queue_size = 1000
